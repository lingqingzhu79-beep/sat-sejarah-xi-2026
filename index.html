    // Fungsi Pengacak Array Profesional (Fisher-Yates Shuffle)
    function acakArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function persiapkanDanAcakSoal() {
        // 1. Acak nomor urutan soal secara total
        acakArray(daftarSoal);

        // 2. Acak pilihan jawaban di dalam masing-masing soal
        daftarSoal.forEach(soal => {
            acakArray(soal.opsi);
        });

        tampilkanSoalKeSiswa();
    }

    function tampilkanSoalKeSiswa() {
        const tempatSoal = document.getElementById('lembar-soal-place');
        tempatSoal.innerHTML = "";
        
        daftarSoal.forEach((soal, idx) => {
            let naskahHtml = '<div class="card-soal"><div class="teks-soal">' + (idx + 1) + '. ' + soal.pertanyaan + '</div>';
            const abjad = ['A', 'B', 'C', 'D', 'E'];
            
            soal.opsi.forEach((opsiPil, oIdx) => {
                let idLabel = "label-" + idx + "-" + oIdx;
                naskahHtml += '<label class="opsi-item" id="' + idLabel + '"><input type="radio" name="soal-' + idx + '" value="' + opsiPil.replace(/"/g, '&quot;') + '" onchange="tandaiPilihan(' + idx + ',' + oIdx + ')" required> <strong>' + abjad[oIdx] + '.</strong> ' + opsiPil + '</label>';
            });
            naskahHtml += '</div>';
            tempatSoal.innerHTML += naskahHtml;
        });
    }

    function tandaiPilihan(soalIdx, opsiIdx) {
        const semuaOpsiDiSoal = document.getElementsByName("soal-" + soalIdx);
        semuaOpsiDiSoal.forEach((item, oIdx) => { document.getElementById("label-" + soalIdx + "-" + oIdx).classList.remove("terpilih"); });
        document.getElementById("label-" + soalIdx + "-" + opsiIdx).classList.add("terpilih");
    }

    function submitJawabanSiswa() {
        const nama = document.getElementById('nama_siswa').value.trim();
        const kelas = document.getElementById('kelas_siswa').value.trim();
        if (!nama || !kelas) { alert("⚠️ Nama Lengkap dan Kelas wajib diisi!"); return; }

        let jumlahBenar = 0; let sudahIsiSemua = true;
        daftarSoal.forEach((soal, idx) => {
            const radioTerpilih = document.querySelector('input[name="soal-' + idx + '"]:checked');
            if (!radioTerpilih) { sudahIsiSemua = false; } 
            else if (radioTerpilih.value === soal.kunci) { jumlahBenar++; }
        });

        if (!sudahIsiSemua) { alert("⚠️ Harap jawab semua pertanyaan!"); return; }
        const nilaiFinal = Math.round((jumlahBenar / daftarSoal.length) * 100);

        const paketData = new FormData();
        paketData.append("nama", nama); paketData.append("kelas", kelas); paketData.append("nilai", nilaiFinal);

        alert("Menghubungkan ke server database guru...");
        fetch(endpointUrl, { method: "POST", body: paketData, mode: "no-cors" }).then(() => {
            alert("🎉 Sukses! Jawaban terkirim.");
            document.querySelector('.wrapper').innerHTML = '<div style="text-align:center; padding:40px 20px;"><h2>✅ Ujian Selesai!</h2><p>Terima kasih <strong>' + nama + ' (' + kelas + ')</strong>, lembar jawaban Anda telah sukses terekam.</p></div>';
        }).catch(() => alert("❌ Gagal mengirim jawaban."));
    }
    
    // Jalankan pengacakan saat halaman dimuat oleh siswa
    window.onload = persiapkanDanAcakSoal;
